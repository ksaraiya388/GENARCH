<svg xmlns="http://www.w3.org/2000/svg" width="960" height="320" viewBox="0 0 960 320" role="img" aria-label="NF-kB pathway diagram">
  <rect width="960" height="320" fill="#f8fafc" />
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#64748b" />
    </marker>
  </defs>
  <rect x="40" y="120" width="160" height="60" rx="8" fill="#F9C9C9" stroke="#334155" />
  <text x="120" y="156" text-anchor="middle" font-size="14" fill="#111827">PM2.5 exposure</text>

  <rect x="250" y="120" width="190" height="60" rx="8" fill="#89E5E6" stroke="#334155" />
  <text x="345" y="156" text-anchor="middle" font-size="14" fill="#111827">ROS / IKK activation</text>

  <rect x="495" y="120" width="170" height="60" rx="8" fill="#F5C75A" stroke="#334155" />
  <text x="580" y="156" text-anchor="middle" font-size="14" fill="#111827">NF-kB signaling</text>

  <rect x="710" y="120" width="200" height="60" rx="8" fill="#D3B3D3" stroke="#334155" />
  <text x="810" y="148" text-anchor="middle" font-size="14" fill="#111827">IL33 / Th2 cytokine</text>
  <text x="810" y="166" text-anchor="middle" font-size="14" fill="#111827">cascade</text>

  <line x1="200" y1="150" x2="250" y2="150" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="440" y1="150" x2="495" y2="150" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="665" y1="150" x2="710" y2="150" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />

  <text x="480" y="268" text-anchor="middle" font-size="13" fill="#475569">
    Educational simplified pathway schematic; not a clinical model.
  </text>
</svg>
