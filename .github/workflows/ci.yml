name: GENARCH CI

on:
  push:
    branches: [main, 'cursor/*']
  pull_request:
    branches: [main]

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install pipeline dependencies
        run: pip install pydantic pandas

      - name: Install site dependencies
        run: cd site && npm ci

      - name: Validate pipeline schemas
        run: python -m pipeline.validate

      - name: Build site
        run: cd site && npx next build
